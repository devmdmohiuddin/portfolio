<template>
  <div class="pf-rails" data-loaded={loaded}>
    <!-- Left rail: social icons -->
    <aside class="pf-rail pf-rail--social" aria-label="Social links">
      <ul class="pf-rail__list">
        <template for:each={socials} for:item="social">
          <li key={social.id} class="pf-rail__item" style={social.style}>
            <a
              class="pf-rail__link"
              href={social.url}
              target="_blank"
              rel="noopener noreferrer"
              aria-label={social.label}
              title={social.label}
            >
              <span class="pf-rail__icon" aria-hidden="true">
                <template lwc:if={social.isGithub}>
                  <svg viewBox="0 0 24 24" fill="currentColor">
                    <path
                      d="M12 .5C5.37.5 0 5.87 0 12.5c0 5.3 3.44 9.8 8.2 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.5.99.11-.78.42-1.3.76-1.6-2.67-.31-5.47-1.34-5.47-5.95 0-1.31.47-2.39 1.24-3.23-.13-.31-.54-1.53.11-3.19 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6 0c2.29-1.55 3.3-1.23 3.3-1.23.65 1.66.24 2.88.12 3.19.77.84 1.23 1.92 1.23 3.23 0 4.62-2.81 5.63-5.49 5.93.43.37.82 1.1.82 2.22v3.29c0 .32.22.7.83.58C20.56 22.29 24 17.8 24 12.5 24 5.87 18.63.5 12 .5z"
                    ></path>
                  </svg>
                </template>
                <template lwc:if={social.isTrailhead}>
                  <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M2 20h20L14.5 7l-3.5 6-2.5-3L2 20z"></path>
                  </svg>
                </template>
                <template lwc:if={social.isLinkedin}>
                  <svg viewBox="0 0 24 24" fill="currentColor">
                    <path
                      d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.86 0-2.14 1.45-2.14 2.94v5.67H9.35V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.72V1.72C24 .77 23.2 0 22.22 0z"
                    ></path>
                  </svg>
                </template>
                <template lwc:if={social.isTwitter}>
                  <svg viewBox="0 0 24 24" fill="currentColor">
                    <path
                      d="M23.95 4.57a10 10 0 0 1-2.82.77 4.96 4.96 0 0 0 2.16-2.72c-.95.56-2 .96-3.13 1.19a4.92 4.92 0 0 0-8.38 4.48A13.94 13.94 0 0 1 1.64 3.16a4.92 4.92 0 0 0 1.52 6.57 4.9 4.9 0 0 1-2.23-.61v.06a4.92 4.92 0 0 0 3.95 4.83 4.96 4.96 0 0 1-2.22.08 4.93 4.93 0 0 0 4.6 3.42A9.87 9.87 0 0 1 0 19.54a13.9 13.9 0 0 0 7.55 2.21c9.05 0 14-7.5 14-14 0-.21 0-.42-.02-.63A9.94 9.94 0 0 0 24 4.59l-.05-.02z"
                    ></path>
                  </svg>
                </template>
                <template lwc:if={social.isFacebook}>
                  <svg viewBox="0 0 24 24" fill="currentColor">
                    <path
                      d="M24 12.07C24 5.4 18.63 0 12 0S0 5.4 0 12.07C0 18.1 4.39 23.1 10.13 24v-8.44H7.08v-3.49h3.05V9.41c0-3.02 1.79-4.69 4.53-4.69 1.31 0 2.68.24 2.68.24v2.97h-1.51c-1.49 0-1.96.93-1.96 1.89v2.25h3.33l-.53 3.49h-2.8V24C19.61 23.1 24 18.1 24 12.07z"
                    ></path>
                  </svg>
                </template>
              </span>
            </a>
          </li>
        </template>
      </ul>
      <span class="pf-rail__spine" aria-hidden="true"></span>
    </aside>

    <!-- Right rail: email -->
    <template lwc:if={email}>
      <aside class="pf-rail pf-rail--email" aria-label="Email">
        <a class="pf-rail__email" href={mailto}>{email}</a>
        <span class="pf-rail__spine" aria-hidden="true"></span>
      </aside>
    </template>
  </div>
</template>
