<template>
  <c-portfolio-section section-id="contact">
    <div class="pf-contact">
      <p class="pf-contact__overline" data-reveal>04. What’s Next?</p>
      <h2 class="pf-contact__title" data-reveal>Get In Touch</h2>
      <template lwc:if={availabilityMessage}>
        <p class="pf-contact__message" data-reveal>{availabilityMessage}</p>
      </template>
      <div class="pf-contact__cta-wrap" data-reveal>
        <button class="pf-contact__cta" type="button" onclick={openDialog}>
          Say Hello
        </button>
      </div>
    </div>

    <c-contact-dialog></c-contact-dialog>
  </c-portfolio-section>
</template>
