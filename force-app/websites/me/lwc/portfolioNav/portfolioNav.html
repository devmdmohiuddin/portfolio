<template>
  <header class={headerClass} data-loaded={loaded}>
    <nav class="pf-nav" aria-label="Primary">
      <a
        class="pf-nav__logo"
        href="#top"
        aria-label="Home"
        onclick={handleNavClick}
        data-target="top"
        style="--pf-delay: 0ms"
      >
        <svg
          class="pf-nav__logo-hex"
          viewBox="0 0 100 100"
          width="44"
          height="44"
          aria-hidden="true"
        >
          <polygon
            class="pf-nav__logo-track"
            points="50,2 91.57,26 91.57,74 50,98 8.43,74 8.43,26"
          ></polygon>
          <polygon
            class="pf-nav__logo-draw"
            points="50,2 91.57,26 91.57,74 50,98 8.43,74 8.43,26"
          ></polygon>
          <text
            class="pf-nav__logo-mark"
            x="50"
            y="52"
            text-anchor="middle"
            dominant-baseline="central"
          >
            {initials}
          </text>
        </svg>
      </a>

      <div class="pf-nav__menu">
        <ol class="pf-nav__links">
          <template for:each={links} for:item="link">
            <li key={link.id} class="pf-nav__item" style={link.style}>
              <a
                class="pf-nav__link"
                href={link.href}
                data-target={link.id}
                onclick={handleNavClick}
              >
                <span class="pf-nav__link-number">{link.number}.</span>
                <span class="pf-nav__link-label">{link.label}</span>
              </a>
            </li>
          </template>
        </ol>

        <c-theme-toggle
          class="pf-nav__toggle"
          style={toggleStyle}
        ></c-theme-toggle>

        <template lwc:if={resumeHref}>
          <a
            class="pf-nav__resume"
            href={resumeHref}
            target="_blank"
            rel="noopener noreferrer"
            style={resumeStyle}
          >
            Resume
          </a>
        </template>
      </div>
    </nav>
  </header>
</template>
