<template>
  <c-portfolio-section
    section-id="more-projects"
    section-title="Other Noteworthy Projects"
  >
    <template lwc:if={archiveUrl}>
      <p class="pf-other__archive-wrap">
        <a
          class="pf-other__archive-link"
          href={archiveUrl}
          target="_blank"
          rel="noreferrer noopener"
          >view the archive</a
        >
      </p>
    </template>

    <template lwc:if={hasProjects}>
      <ul id="other-projects-grid" class="pf-other__grid" role="list">
        <template for:each={cards} for:item="card">
          <li key={card.id} class="pf-card" data-reveal>
            <div class="pf-card__inner">
              <header class="pf-card__header">
                <svg
                  class="pf-card__folder"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                  focusable="false"
                >
                  <path
                    d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"
                  ></path>
                </svg>
                <div class="pf-card__links">
                  <template lwc:if={card.githubUrl}>
                    <a
                      class="pf-card__link"
                      href={card.githubUrl}
                      target="_blank"
                      rel="noreferrer noopener"
                      aria-label={card.githubLabel}
                      title="GitHub"
                    >
                      <svg
                        class="pf-card__icon"
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                        focusable="false"
                      >
                        <path
                          d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"
                        ></path>
                      </svg>
                    </a>
                  </template>
                  <template lwc:if={card.externalUrl}>
                    <a
                      class="pf-card__link"
                      href={card.externalUrl}
                      target="_blank"
                      rel="noreferrer noopener"
                      aria-label={card.externalLabel}
                      title="External link"
                    >
                      <svg
                        class="pf-card__icon"
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                        focusable="false"
                      >
                        <path
                          d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"
                        ></path>
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <line x1="10" y1="14" x2="21" y2="3"></line>
                      </svg>
                    </a>
                  </template>
                </div>
              </header>

              <h3 class="pf-card__title">
                <template lwc:if={card.titleUrl}>
                  <a
                    class="pf-card__title-link"
                    href={card.titleUrl}
                    target="_blank"
                    rel="noreferrer noopener"
                    >{card.title}</a
                  >
                </template>
                <template lwc:else>{card.title}</template>
              </h3>

              <p class="pf-card__description">{card.description}</p>

              <template lwc:if={card.hasTech}>
                <ul class="pf-card__tech" role="list">
                  <template for:each={card.tech} for:item="tag">
                    <li key={tag.id} class="pf-card__tech-item">{tag.name}</li>
                  </template>
                </ul>
              </template>
            </div>
          </li>
        </template>
      </ul>

      <template lwc:if={hasArchive}>
        <div class="pf-other__more-wrap">
          <button
            class="pf-other__more"
            type="button"
            aria-expanded={archiveExpanded}
            aria-controls="other-projects-grid"
            onclick={handleToggleArchive}
          >
            {toggleLabel}
          </button>
        </div>
      </template>
    </template>

    <template lwc:if={showEmpty}>
      <p class="pf-other__empty">More projects coming soon.</p>
    </template>
  </c-portfolio-section>
</template>
