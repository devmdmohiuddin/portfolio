<template>
  <c-portfolio-section
    section-id="work"
    section-number="03"
    section-title="Some Things I've Built"
  >
    <template lwc:if={hasProjects}>
      <ul class="pf-projects" role="list">
        <template for:each={cards} for:item="card">
          <li key={card.id} class={card.cssClass} data-reveal>
            <div class="pf-proj__media">
              <template lwc:if={card.imageUrl}>
                <template lwc:if={card.titleUrl}>
                  <a
                    class="pf-proj__image-link"
                    href={card.titleUrl}
                    target="_blank"
                    rel="noreferrer noopener"
                    aria-label={card.externalLabel}
                    tabindex="-1"
                  >
                    <img
                      class="pf-proj__image"
                      src={card.imageUrl}
                      alt={card.imageAlt}
                      loading="lazy"
                    />
                  </a>
                </template>
                <template lwc:else>
                  <span class="pf-proj__image-link">
                    <img
                      class="pf-proj__image"
                      src={card.imageUrl}
                      alt={card.imageAlt}
                      loading="lazy"
                    />
                  </span>
                </template>
              </template>
              <template lwc:else>
                <div class="pf-proj__image-link pf-proj__image-fallback">
                  <span class="pf-proj__fallback-title">{card.title}</span>
                </div>
              </template>
            </div>

            <div class="pf-proj__content">
              <p class="pf-proj__overline">Featured Project</p>
              <h3 class="pf-proj__title">
                <template lwc:if={card.titleUrl}>
                  <a
                    class="pf-proj__title-link"
                    href={card.titleUrl}
                    target="_blank"
                    rel="noreferrer noopener"
                    >{card.title}</a
                  >
                </template>
                <template lwc:else>{card.title}</template>
              </h3>
              <div class="pf-proj__description">
                <p>{card.description}</p>
              </div>
              <template lwc:if={card.hasTech}>
                <ul class="pf-proj__tech" role="list">
                  <template for:each={card.tech} for:item="tag">
                    <li key={tag.id} class="pf-proj__tech-item">{tag.name}</li>
                  </template>
                </ul>
              </template>
              <div class="pf-proj__links">
                <template lwc:if={card.githubUrl}>
                  <a
                    class="pf-proj__link"
                    href={card.githubUrl}
                    target="_blank"
                    rel="noreferrer noopener"
                    aria-label={card.githubLabel}
                    title="GitHub"
                  >
                    <svg
                      class="pf-proj__icon"
                      xmlns="http://www.w3.org/2000/svg"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      aria-hidden="true"
                      focusable="false"
                    >
                      <path
                        d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"
                      ></path>
                    </svg>
                  </a>
                </template>
                <template lwc:if={card.externalUrl}>
                  <a
                    class="pf-proj__link"
                    href={card.externalUrl}
                    target="_blank"
                    rel="noreferrer noopener"
                    aria-label={card.externalLabel}
                    title="External link"
                  >
                    <svg
                      class="pf-proj__icon"
                      xmlns="http://www.w3.org/2000/svg"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      aria-hidden="true"
                      focusable="false"
                    >
                      <path
                        d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"
                      ></path>
                      <polyline points="15 3 21 3 21 9"></polyline>
                      <line x1="10" y1="14" x2="21" y2="3"></line>
                    </svg>
                  </a>
                </template>
              </div>
            </div>
          </li>
        </template>
      </ul>
    </template>
  </c-portfolio-section>
</template>
